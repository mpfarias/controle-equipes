version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: afastamentos-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: afastamentos_db
      MYSQL_USER: afastamentos_user
      MYSQL_PASSWORD: afastamentos_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

